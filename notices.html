<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board | SOL Lab</title>
  <link rel="icon" href="images/sol.jpeg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'};</script>
  <link rel="stylesheet" href="assets/site.css" />
  <script>document.documentElement.classList.add("i18n-pending");</script>
  <script>
    document.documentElement.setAttribute('data-lang', (localStorage.getItem('lang') === 'ko') ? 'ko' : 'en');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || !savedTheme) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    .lux-bg {
      background:
        radial-gradient(circle at 12% -8%, rgba(255, 255, 255, 0.4), transparent 35%),
        linear-gradient(180deg, #f5f5f5 0%, #e5e7eb 100%);
    }
    .dark .lux-bg {
      background: linear-gradient(180deg, #09090b 0%, #18181b 100%);
    }
    .lux-section {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(24, 24, 27, 0.08);
      box-shadow: 0 12px 28px rgba(24, 24, 27, 0.06);
    }
    .dark .lux-section {
      background: rgba(24, 24, 27, 0.78);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.34);
    }
    .board-image {
      background: transparent;
    }
    .board-image img {
      display: block;
      width: auto;
      max-width: 180px;
      max-height: 270px;
      height: auto;
    }
  </style>
</head>
<body class="lux-bg bg-neutral-100 dark:bg-neutral-950 text-gray-800 dark:text-white font-inter">
  <div id="site-header"></div>

  <section class="py-16 px-4">
    <div class="max-w-5xl mx-auto lux-section rounded-3xl px-6 py-10 md:px-10">
      <h1 class="text-4xl font-extrabold mb-10 text-center" data-i18n="nav_notice">Board</h1>
      <div id="board-categories" class="mb-6 flex flex-wrap justify-center gap-2">
        <button type="button" data-category="all" class="board-cat-btn rounded-full px-4 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200">All</button>
        <button type="button" data-category="notice" class="board-cat-btn rounded-full px-4 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200">Notice</button>
        <button type="button" data-category="conference" class="board-cat-btn rounded-full px-4 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200">Conference</button>
        <button type="button" data-category="labnews" class="board-cat-btn rounded-full px-4 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200">Lab News</button>
      </div>
      <div id="news-container" class="space-y-6"></div>
      <p id="news-empty" class="hidden text-center text-sm text-slate-500 dark:text-slate-300 mt-6"></p>
      <div id="news-pagination" class="mt-8 flex flex-wrap justify-center gap-2"></div>
    </div>
  </section>

  <div id="site-footer"></div>
  <div id="site-contact"></div>

  <script src="assets/site.js"></script>
  <script>
    const translations = {
      en: {
        title: "Board | SOL Lab",
        labname: "SOL Lab",
        lab_affil: "at SKKU",
        nav_home: "Home",
        nav_people: "People",
        nav_research: "Research",
        nav_publications: "Publications",
        nav_projects: "Projects",
        nav_teaching: "Teaching",
        nav_notice: "Board",
        contact: "Contact Information",
        university: "Sungkyunkwan University",
        address: "2066, Seobu-ro, Jangan-gu, Suwon, Gyeonggi, Korea (16419)",
        lab: "Lab: #27415, Engineering Building II",
        tel: "Tel: +82 31-290-7612",
        email: "Email:",
        contact_button: "Contact",
        category_all: "All",
        category_notice: "Notice",
        category_conference: "Conference",
        category_labnews: "Lab Member News",
        news_empty: "No posts found in this category.",
        news_link: "View more",
        prev: "Previous",
        next: "Next"
      },
      ko: {
        title: "게시판 | 최적화 연구실",
        labname: "최적화 연구실",
        lab_affil: "성균관대학교",
        nav_home: "홈",
        nav_people: "연구진",
        nav_research: "연구",
        nav_publications: "논문",
        nav_projects: "프로젝트",
        nav_teaching: "강의",
        nav_notice: "게시판",
        contact: "연락처",
        university: "성균관대학교",
        address: "경기도 수원시 장안구 서부로 2066 (16419)",
        lab: "실험실: 제2공학관 27415호",
        tel: "전화: 031-290-7612",
        email: "이메일:",
        contact_button: "연락처",
        category_all: "전체",
        category_notice: "공지사항",
        category_conference: "학회",
        category_labnews: "랩멤버 소식",
        news_empty: "해당 카테고리에 게시물이 없습니다.",
        news_link: "자세히 보기",
        prev: "이전",
        next: "다음"
      }
    };

    const boardState = {
      items: [],
      category: "all",
      page: 1,
      perPage: 6
    };

    function escapeHtml(value) {
      return String(value).replace(/[&<>\"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function getLang() {
      const lang = localStorage.getItem("lang");
      return lang === "ko" ? "ko" : "en";
    }

    async function loadBoardItems() {
      const response = await fetch("news.json", { cache: "no-store" });
      if (!response.ok) throw new Error("Failed to load news.json");
      boardState.items = await response.json();
    }

    function getFilteredItems() {
      if (boardState.category === "all") return boardState.items;
      return boardState.items.filter((item) => item.category === boardState.category);
    }

    function updateCategoryButtons(lang) {
      const labelMap = {
        all: translations[lang].category_all,
        notice: translations[lang].category_notice,
        conference: translations[lang].category_conference,
        labnews: translations[lang].category_labnews
      };
      document.querySelectorAll(".board-cat-btn").forEach((btn) => {
        const active = btn.dataset.category === boardState.category;
        btn.textContent = labelMap[btn.dataset.category] || btn.dataset.category;
        btn.classList.toggle("bg-slate-900", active);
        btn.classList.toggle("text-white", active);
        btn.classList.toggle("dark:bg-white", active);
        btn.classList.toggle("dark:text-black", active);
      });
    }

    function renderPagination(lang, totalPages) {
      const wrap = document.getElementById("news-pagination");
      wrap.innerHTML = "";
      if (totalPages <= 1) return;

      const prev = document.createElement("button");
      prev.className = "rounded-full px-3 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 disabled:opacity-40 disabled:cursor-not-allowed";
      prev.textContent = translations[lang].prev;
      prev.disabled = boardState.page === 1;
      prev.onclick = () => {
        boardState.page -= 1;
        renderBoard(lang);
      };
      wrap.appendChild(prev);

      for (let i = 1; i <= totalPages; i += 1) {
        const btn = document.createElement("button");
        const active = i === boardState.page;
        btn.className = active
          ? "rounded-full px-3 py-1.5 text-sm font-semibold border border-slate-900 dark:border-white bg-slate-900 dark:bg-white text-white dark:text-black"
          : "rounded-full px-3 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200";
        btn.textContent = String(i);
        btn.onclick = () => {
          boardState.page = i;
          renderBoard(lang);
        };
        wrap.appendChild(btn);
      }

      const next = document.createElement("button");
      next.className = "rounded-full px-3 py-1.5 text-sm font-semibold border border-slate-300 dark:border-slate-600 bg-white/80 dark:bg-slate-800/80 text-slate-700 dark:text-slate-200 disabled:opacity-40 disabled:cursor-not-allowed";
      next.textContent = translations[lang].next;
      next.disabled = boardState.page === totalPages;
      next.onclick = () => {
        boardState.page += 1;
        renderBoard(lang);
      };
      wrap.appendChild(next);
    }

    function renderBoard(lang) {
      const container = document.getElementById("news-container");
      const empty = document.getElementById("news-empty");
      const filtered = getFilteredItems();
      const totalPages = Math.max(1, Math.ceil(filtered.length / boardState.perPage));
      if (boardState.page > totalPages) boardState.page = totalPages;
      const start = (boardState.page - 1) * boardState.perPage;
      const pageItems = filtered.slice(start, start + boardState.perPage);

      updateCategoryButtons(lang);
      container.innerHTML = "";

      if (!pageItems.length) {
        empty.textContent = translations[lang].news_empty;
        empty.classList.remove("hidden");
      } else {
        empty.classList.add("hidden");
      }

      pageItems.forEach((item) => {
        const card = document.createElement("article");
        card.className = "rounded-2xl bg-white/85 dark:bg-zinc-900/85 border border-slate-200 dark:border-slate-700 p-5 shadow-sm";
        const title = item.title?.[lang] || item.title?.en || "";
        const desc = item.description?.[lang] || item.description?.en || "";
        const images = Array.isArray(item.images) ? item.images : [];
        const imageGrid = images.length
          ? `<div class="mt-4 flex w-fit max-w-full flex-wrap items-start justify-start gap-2">${images.map((src, index) => `
              <button type="button" class="board-image-trigger block border-0 bg-transparent p-0 text-left" data-img-open="${escapeHtml(src)}" aria-label="Open image ${index + 1}">
                <div class="board-image overflow-hidden rounded-xl">
                  <img src="${escapeHtml(src)}" alt="${escapeHtml(title)}" class="object-contain rounded-xl">
                </div>
              </button>
            `).join("")}</div>`
          : "";
        card.innerHTML = `
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500 dark:text-slate-400">${escapeHtml(item.date || "")}</p>
              <h2 class="mt-2 text-lg font-bold text-slate-900 dark:text-white">${title}</h2>
            </div>
          </div>
          ${desc ? `<div class="mt-3 text-sm leading-7 text-slate-600 dark:text-slate-300">${desc}</div>` : ""}
          ${imageGrid}
        `;
        container.appendChild(card);
      });

      container.querySelectorAll(".board-image-trigger").forEach((el) => {
        el.addEventListener("click", () => {
          const src = el.getAttribute("data-img-open");
          if (src && window.Site?.openImageModal) window.Site.openImageModal(src);
        });
      });

      renderPagination(lang, totalPages);
    }

    function bindCategoryEvents() {
      document.querySelectorAll(".board-cat-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          boardState.category = btn.dataset.category || "all";
          boardState.page = 1;
          renderBoard(getLang());
        });
      });
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        await window.Site.init({
          active: "notices",
          translations,
          onLangChange: (lang) => renderBoard(lang)
        });
        bindCategoryEvents();
        await loadBoardItems();
        renderBoard(getLang());
      } catch (error) {
        console.error("Failed to initialize board page:", error);
        const lang = getLang();
        const empty = document.getElementById("news-empty");
        if (empty) {
          empty.textContent = translations[lang].news_empty;
          empty.classList.remove("hidden");
        }
      } finally {
        document.documentElement.classList.remove("i18n-pending");
      }
    });
  </script>
</body>
</html>
