    function toggleLanguage() {
      const current = localStorage.getItem('lang') || 'en';

    function syncAnchorMenuLabels(lang) {
      const isKo = lang === 'ko';
      const peopleProf = document.getElementById('peopleMenuProf');
      const peopleStudents = document.getElementById('peopleMenuStudents');
      const peopleAlumni = document.getElementById('peopleMenuAlumni');
      const researchTheory = document.getElementById('researchMenuTheory');
      const researchApps = document.getElementById('researchMenuApps');
      const projectsOngoing = document.getElementById('projectsMenuOngoing');
      const projectsCompleted = document.getElementById('projectsMenuCompleted');
      if (peopleProf) peopleProf.textContent = isKo ? '교수' : 'Professors';
      if (peopleStudents) peopleStudents.textContent = isKo ? '학생' : 'Students';
      if (peopleAlumni) peopleAlumni.textContent = isKo ? '졸업생' : 'Alumni';
      if (researchTheory) researchTheory.textContent = isKo ? '이론 및 방법론' : 'Theory / Methodology';
      if (researchApps) researchApps.textContent = isKo ? '응용 분야' : 'Applications';
      if (projectsOngoing) projectsOngoing.textContent = isKo ? '진행 중' : 'Ongoing';
      if (projectsCompleted) projectsCompleted.textContent = isKo ? '완료' : 'Completed';
    }

    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.documentElement.setAttribute('data-lang', lang);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) el.innerHTML = translations[lang][key];
      });
      document.title = translations[lang]?.title || document.title;
      setTimeout(() => document.documentElement.classList.remove("i18n-pending"), 0);
      const ind = document.getElementById('langIndicator');
      const en = document.getElementById('langEN');
      const ko = document.getElementById('langKO');
      if (en && ko) {
        en.classList.toggle('text-white', lang === 'en');
        ko.classList.toggle('text-white', lang === 'ko');
        en.classList.toggle('text-slate-600', lang !== 'en');
        ko.classList.toggle('text-slate-600', lang !== 'ko');
        en.classList.toggle('dark:text-slate-300', lang !== 'en');
        ko.classList.toggle('dark:text-slate-300', lang !== 'ko');
      }
      if (ind) ind.style.transform = lang === 'ko' ? 'translateX(100%)' : 'translateX(0%)';
      syncAnchorMenuLabels(lang);
    }

    function toggleDarkMode() {
      const html = document.documentElement;
      const icon = document.getElementById('darkToggle');
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      const ind = document.getElementById('themeIndicator');
      const dark = document.getElementById('themeDark');
      const light = document.getElementById('themeLight');
      if (dark && light) {
        dark.classList.toggle('text-white', !isDark);
        dark.classList.toggle('text-slate-600', isDark);
        dark.classList.toggle('dark:text-slate-300', isDark);
        light.classList.toggle('text-white', isDark);
        light.classList.toggle('text-slate-600', !isDark);
        light.classList.toggle('dark:text-slate-300', !isDark);
      }
      if (ind) ind.style.transform = isDark ? 'translateX(0%)' : 'translateX(100%)';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      if (window.Site) await window.Site.init({ active: 'teaching', translations });
      const lang = localStorage.getItem('lang') || 'en';
      setLanguage(lang);
      const icon = document.getElementById('darkToggle');
      const isDarkNow = document.documentElement.classList.contains('dark');
      const ind = document.getElementById('themeIndicator');
      const dark = document.getElementById('themeDark');
      const light = document.getElementById('themeLight');

        dark.classList.toggle('dark:text-slate-300', !isDarkNow);
        light.classList.toggle('text-white', !isDarkNow);
        light.classList.toggle('text-slate-600', isDarkNow);
        light.classList.toggle('dark:text-slate-300', isDarkNow);
      }
      if (ind) ind.style.transform = isDarkNow ? 'translateX(100%)' : 'translateX(0%)';
    });

<script>
  function toggleMapByLang(lang) {
    const mapKo = document.getElementById('map-ko');
    const mapEn = document.getElementById('map-en');
    if (mapKo && mapEn) {
      mapKo.classList.toggle('hidden', lang !== 'ko');
      mapEn.classList.toggle('hidden', lang !== 'en');
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    const lang = localStorage.getItem("lang") || "en";
    toggleMapByLang(lang);

    if (typeof setLanguage === "function") {
      const originalSetLanguage = setLanguage;
      setLanguage = function(lang) {
        originalSetLanguage(lang);
        toggleMapByLang(lang);
      };
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('map-modal-ko')?.classList.add('hidden');
      document.getElementById('map-modal-en')?.classList.add('hidden');
    }
  });
</script>

<script>
  function closeContactInfo() {
    const contact = document.getElementById('contact-info');
    const toggleBtn = document.getElementById('contactToggleBtn');
    contact.classList.add('hidden');
    toggleBtn.classList.remove('hidden');
    const lang = localStorage.getItem('lang') || 'en';
    toggleBtn.textContent = `📬 ${translations[lang]['contact_button']}`;
  }
  function toggleContactInfo() {
    const contact = document.getElementById('contact-info');
    const toggleBtn = document.getElementById('contactToggleBtn');
    contact.classList.remove('hidden');
    toggleBtn.classList.add('hidden');
  }
  if (typeof setLanguage === 'function') {
    const originalSetLanguage = setLanguage;
    setLanguage = function(lang) {
      originalSetLanguage(lang);
      document.getElementById('contactToggleBtn').textContent = `📬 ${translations[lang]['contact_button']}`;
    };
  }
</script>
