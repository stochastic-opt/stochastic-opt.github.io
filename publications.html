    function setLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.documentElement.setAttribute('data-lang', lang);

        en.classList.toggle('text-slate-600', lang !== 'en');
        ko.classList.toggle('text-slate-600', lang !== 'ko');
        en.classList.toggle('dark:text-slate-300', lang !== 'en');
        ko.classList.toggle('dark:text-slate-300', lang !== 'ko');
      }
      if (ind) ind.style.transform = lang === 'ko' ? 'translateX(100%)' : 'translateX(0%)';
    }

    // Function to render Preprints
    function renderPreprints() {
      const container = document.getElementById('preprints-container');
      if (!container) return;

      // Clear the container before rendering
      container.innerHTML = '';

      // Loop through preprints and render each
      preprints.forEach(preprint => {
        const div = document.createElement('div');
        div.className = 'flex gap-4 bg-white dark:bg-gray-900 rounded-xl shadow-md p-6';

        // Build HTML for each preprint
        // Build HTML for each preprint
div.innerHTML = `
  <div>
    <h3 class="text-sm font-semibold">${preprint.title}</h3>
    <p class="text-xs text-gray-600 dark:text-gray-300 mt-2">${preprint.authors} | ${preprint.year}</p>
  </div>
`;
        container.appendChild(div);
      });
    }

    // Function to render publications
    function renderPublications() {
      const container = document.getElementById('publications-container');
    if (!container) return;

    // Clear the container before rendering
    container.innerHTML = '';

    // Loop through publications and render each
    publications.forEach(pub => {
      const div = document.createElement('div');
      div.className = 'flex gap-4 bg-white dark:bg-gray-900 rounded-xl shadow-md p-6';

      // volume / pages 유무 체크 (공백 문자열도 제외)
      const hasVolume = pub.volume && pub.volume.toString().trim() !== '';
      const hasPages  = pub.pages && pub.pages.toString().trim() !== '';

      let volumePagesHTML = '';
      if (hasVolume || hasPages) {
        const volumeText = hasVolume ? `Volume: ${pub.volume}` : '';
        const pagesText  = hasPages  ? `Pages: ${pub.pages}`  : '';
        const sep = (hasVolume && hasPages) ? ', ' : '';

        volumePagesHTML = `
          <p class="mt-1">${volumeText}${sep}${pagesText}</p>
        `;
      }

      // Build HTML for each publication
      div.innerHTML = `
        <div>
          <h3 class="text-sm font-semibold">${pub.title}</h3>
          <div class="text-xs text-gray-600 dark:text-gray-300 mt-2">
            <p>Author(s): ${pub.authors}</p>
            <p class="mt-1">Published in: ${pub.journal || 'N/A'}, ${pub.year}</p>
            ${volumePagesHTML}
            <a href="${pub.url}" class="text-blue-500 hover:underline mt-2 inline-block">Read More</a>
          </div>
        </div>
      `;
      container.appendChild(div);
    });
    }

<script>
  function toggleMapByLang(lang) {
    const mapKo = document.getElementById('map-ko');
    const mapEn = document.getElementById('map-en');
    if (mapKo && mapEn) {
      mapKo.classList.toggle('hidden', lang !== 'ko');
      mapEn.classList.toggle('hidden', lang !== 'en');
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    const lang = localStorage.getItem("lang") || "en";
    toggleMapByLang(lang);

    if (typeof setLanguage === "function") {
      const originalSetLanguage = setLanguage;
      setLanguage = function(lang) {
        originalSetLanguage(lang);
        toggleMapByLang(lang);
      };
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('map-modal-ko')?.classList.add('hidden');
      document.getElementById('map-modal-en')?.classList.add('hidden');
    }
  });
</script>
